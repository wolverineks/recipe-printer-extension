<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Printer Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options">
      <h1>Recipe Printer Settings</h1>
      <p>
        Connect this browser to your Umbrel <strong>Recipes</strong> app. The xAI API key and Grok
        model are saved in Recipes under <strong>Add new device</strong>, not in the extension.
      </p>

      <form id="settings-form" novalidate>
        <label for="umbrel-url">Umbrel Recipes URL</label>
        <input
          id="umbrel-url"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="http://192.168.1.50:4020 (must include :4020)"
        />

        <label for="umbrel-token">Ingest API Token</label>
        <input
          id="umbrel-token"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste token from Recipes app"
        />

        <div class="button-row">
          <button type="submit" class="primary-btn">Save</button>
          <button id="test-umbrel-btn" type="button" class="secondary-btn">Test Umbrel connection</button>
        </div>
      </form>

      <p id="umbrel-status" class="umbrel-status" aria-live="polite"></p>
      <p id="save-status" class="status" aria-live="polite"></p>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
