<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Printer Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options">
      <h1>Recipe Printer Settings</h1>
      <p>
        Get an API key from
        <a href="https://console.x.ai/team/default/api-keys" target="_blank" rel="noreferrer">xAI Console</a>.
      </p>

      <form id="settings-form" novalidate>
        <label for="api-key">xAI API Key</label>
        <input id="api-key" type="password" autocomplete="off" placeholder="xai-..." />

        <label for="model">Grok Model</label>
        <select id="model">
          <option value="grok-4-1-fast">grok-4-1-fast (recommended)</option>
          <option value="grok-4-fast">grok-4-fast</option>
          <option value="grok-4">grok-4 (higher quality, slower)</option>
        </select>

        <h2>Umbrel Recipes</h2>
        <p>
          Copy the URL and ingest token from the <strong>Recipes</strong> app
          (shown at the top of the page). Example URL:
          <code>http://192.168.1.50:4020</code>
        </p>

        <label for="umbrel-url">Umbrel Recipes URL</label>
        <input
          id="umbrel-url"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="http://192.168.1.50:4020"
        />

        <label for="umbrel-token">Ingest API Token</label>
        <input
          id="umbrel-token"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="Paste token from Recipes app"
        />

        <div class="button-row">
          <button type="submit" class="primary-btn">Save</button>
          <button id="test-umbrel-btn" type="button" class="secondary-btn">Test Umbrel connection</button>
        </div>
      </form>

      <p id="umbrel-status" class="umbrel-status" aria-live="polite"></p>
      <p id="save-status" class="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
